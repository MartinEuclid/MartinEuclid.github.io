<!doctype html>
<html lang="zh-Hant" data-theme="auto">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title><!-- 你的名字 --></title>

  <style>
    /* ========= 主題變數 ========= */
    :root{
      --bg:#0b1020;
      --panel:rgba(17,24,39,.9);
      --text:#e5e7eb;
      --muted:#9aa4b2;
      --border:rgba(148,163,184,.18);
      --brand:#60a5fa;
      --brand2:#22d3ee;
      --header:rgba(11,16,32,.72);
    }

    html[data-theme="light"]{
      --bg:#f8fafc;
      --panel:#ffffff;
      --text:#0f172a;
      --muted:#475569;
      --border:rgba(71,85,105,.25);
      --brand:#2563eb;
      --brand2:#38bdf8;
      --header:rgba(255,255,255,.8);
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;
      background:var(--bg);
      color:var(--text);
      line-height:1.6;
    }

    a{color:var(--brand);text-decoration:none}
    a:hover{text-decoration:underline}

    .container{max-width:1000px;margin:auto;padding:24px}

    header{
      position:sticky;top:0;z-index:10;
      backdrop-filter:blur(12px);
      background:var(--header);
      border-bottom:1px solid var(--border);
    }

    .nav{display:flex;justify-content:space-between;align-items:center}
    .links{display:flex;gap:12px;flex-wrap:wrap}

    .btn{
      padding:8px 14px;
      border-radius:12px;
      border:1px solid var(--border);
      background:transparent;
      color:var(--text);
      cursor:pointer;
    }

    .section{padding:48px 0}
    .section h2{margin-bottom:12px}

    .card{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:16px;
      padding:20px;
      margin-top:16px;
    }

    footer{
      border-top:1px solid var(--border);
      padding:32px 0;
      color:var(--muted);
      font-size:14px;
      margin-top:48px;
    }
  </style>
</head>

<body>
<header>
  <div class="container nav">
    <div>
      <!-- 你的名字 -->
    </div>
    <nav class="links">
      <a class="btn" href="#home">Home</a>
      <a class="btn" href="#resume">Resume</a>
      <a class="btn" href="#papers">Papers</a>
      <a class="btn" href="#contact">Contact</a>
      <button class="btn" id="themeToggle">Theme</button>
    </nav>
  </div>
</header>

<main class="container">

  <!-- ===== 首頁 ===== -->
  <section class="section" id="home">
    <h1></h1>
    <p></p>
  </section>

  <!-- ===== 簡歷 ===== -->
  <section class="section" id="resume">
    <h2>Resume</h2>

    <div class="card">
      <h3></h3>
      <p></p>
    </div>

    <div class="card">
      <h3></h3>
      <p></p>
    </div>
  </section>

  <!-- ===== 論文 ===== -->
  <section class="section" id="papers">
    <h2>Papers</h2>

    <div class="card">
      <h3></h3>
      <p></p>
      <p></p>
    </div>

    <div class="card">
      <h3></h3>
      <p></p>
      <p></p>
    </div>
  </section>

  <!-- ===== 聯絡 ===== -->
  <section class="section" id="contact">
    <h2>Contact</h2>

    <div class="card">
      <p></p>
      <p></p>
    </div>
  </section>

</main>

<footer>
  <div class="container">
    © <span id="year"></span>
  </div>
</footer>

<script>
  // 主題切換（可不管，能用即可）
  const btn = document.getElementById("themeToggle");
  const root = document.documentElement;
  btn.onclick = () => {
    root.dataset.theme =
      root.dataset.theme === "light" ? "dark" : "light";
  };

  document.getElementById("year").textContent =
    new Date().getFullYear();
</script>
</body>
</html>
